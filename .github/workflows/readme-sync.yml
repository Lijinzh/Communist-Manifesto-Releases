name: README translation sync

on:
  pull_request:
    paths:
      - "README.md"
      - "README.zh-CN.md"
      - "docs/README.bilingual.md"
      - "scripts/sync_readmes.py"
      - ".github/workflows/readme-sync.yml"
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "README.zh-CN.md"
      - "docs/README.bilingual.md"
      - "scripts/sync_readmes.py"
      - ".github/workflows/readme-sync.yml"

permissions:
  contents: read

jobs:
  check-readmes:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Verify generated README files
        run: python3 scripts/sync_readmes.py --check
